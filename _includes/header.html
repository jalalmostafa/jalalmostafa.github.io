<header class="site-header">

  <div class="wrapper">
    <!-- <a class="site-title" href="{{ site.baseurl }}/">{{ site.title }}</a> -->
    <nav class="site-nav">
      <!-- <a href="#" class="menu-icon"></a> -->

      <div class="trigger">
        {% assign sorted_pages = site.pages | sort:"order" %}
        {% for page in sorted_pages %}
          {% if page.title and page.publish != false %}
          <a class="page-link multi-color" href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
          {% endif %}
        {% endfor %}
      </div>
    </nav>
  </div>
</header>
